# Nginx конфиг для errani.ru
# Файл: /etc/nginx/sites-available/errani.ru
# Симлинк: ln -s /etc/nginx/sites-available/errani.ru /etc/nginx/sites-enabled/

# Редирект HTTP → HTTPS
server {
    listen 80;
    listen [::]:80;
    server_name errani.ru www.errani.ru;
    return 301 https://errani.ru$request_uri;
}

# Редирект www → без www
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name www.errani.ru;

    ssl_certificate     /etc/letsencrypt/live/errani.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/errani.ru/privkey.pem;

    return 301 https://errani.ru$request_uri;
}

# Основной сервер
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name errani.ru;

    ssl_certificate     /etc/letsencrypt/live/errani.ru/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/errani.ru/privkey.pem;
    ssl_protocols       TLSv1.2 TLSv1.3;
    ssl_ciphers         HIGH:!aNULL:!MD5;

    # Максимальный размер загружаемых файлов (для медиа)
    client_max_body_size 20M;

    # Статика Next.js — кэш 1 год
    location /_next/static/ {
        alias /var/www/errani/.next/static/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Медиафайлы из /public
    location /media/ {
        alias /var/www/errani/public/media/;
        expires 30d;
        add_header Cache-Control "public";
    }

    location /fonts/ {
        alias /var/www/errani/public/fonts/;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    location /logos/ {
        alias /var/www/errani/public/logos/;
        expires 30d;
        add_header Cache-Control "public";
    }

    # Все остальное → Next.js (порт 3000)
    location / {
        proxy_pass         http://127.0.0.1:3000;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection 'upgrade';
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_cache_bypass $http_upgrade;
    }
}
